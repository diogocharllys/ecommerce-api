name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecommercedb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/ecommercedb"
      JWT_SECRET: "ci-test-secret"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Push database schema
        run: npx prisma db push --schema=src/prisma/schema.prisma --skip-generate

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand
